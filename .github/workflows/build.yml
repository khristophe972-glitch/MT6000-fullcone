name: Build OpenWrt Pesa+Fullcone GL-MT6000

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h

      - name: Clone pesa1234 openwrt
        run: |
          git clone --depth 1 -b main https://github.com/pesa1234/openwrt.git .

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev \
            libssl-dev python3-setuptools rsync unzip zlib1g-dev \
            file wget quilt automake autoconf libtool

      - name: Apply turboacc patches
        run: |
          curl -sL https://raw.githubusercontent.com/chenmozhijin/turboacc/luci/add_turboacc.sh -o add_turboacc.sh
          bash add_turboacc.sh --no-sfe

      - name: Fix fullcone dependencies
        run: |
          find . -path "*/nft-fullcone/Makefile" -exec sed -i 's/kmod-nf-conntrack6//g' {} \;

      - name: Add fullcone patches from ImmortalWrt
        run: |
          # libnftnl
          mkdir -p package/libs/libnftnl/patches
          curl -sL "https://raw.githubusercontent.com/immortalwrt/immortalwrt/master/package/libs/libnftnl/patches/001-libnftnl-add-fullcone-expression-support.patch" \
            -o package/libs/libnftnl/patches/001-libnftnl-add-fullcone-expression-support.patch
          sed -i '/^PKG_INSTALL/i PKG_FIXUP:=autoreconf' package/libs/libnftnl/Makefile

          # nftables
          mkdir -p package/network/utils/nftables/patches
          curl -sL "https://raw.githubusercontent.com/immortalwrt/immortalwrt/master/package/network/utils/nftables/patches/002-nftables-add-fullcone-expression-support.patch" \
            -o package/network/utils/nftables/patches/002-nftables-add-fullcone-expression-support.patch

          # firewall4
          mkdir -p package/network/config/firewall4/patches
          curl -sL "https://raw.githubusercontent.com/immortalwrt/immortalwrt/master/package/network/config/firewall4/patches/001-firewall4-add-support-for-fullcone-nat.patch" \
            -o package/network/config/firewall4/patches/001-firewall4-add-support-for-fullcone-nat.patch

          # fullconenat-nft
          mkdir -p package/network/utils/fullconenat-nft/patches
          curl -sL "https://raw.githubusercontent.com/immortalwrt/immortalwrt/master/package/network/utils/fullconenat-nft/Makefile" \
            -o package/network/utils/fullconenat-nft/Makefile
          curl -sL "https://raw.githubusercontent.com/immortalwrt/immortalwrt/master/package/network/utils/fullconenat-nft/patches/010-fix-build-with-kernel-6.12.patch" \
            -o package/network/utils/fullconenat-nft/patches/010-fix-build-with-kernel-6.12.patch

          # fullconenat
          mkdir -p package/network/utils/fullconenat/patches
          mkdir -p package/network/utils/fullconenat/src
          curl -sL "https://raw.githubusercontent.com/immortalwrt/immortalwrt/master/package/network/utils/fullconenat/Makefile" \
            -o package/network/utils/fullconenat/Makefile
          curl -sL "https://raw.githubusercontent.com/immortalwrt/immortalwrt/master/package/network/utils/fullconenat/patches/000-printk.patch" \
            -o package/network/utils/fullconenat/patches/000-printk.patch
          curl -sL "https://raw.githubusercontent.com/immortalwrt/immortalwrt/master/package/network/utils/fullconenat/src/Makefile" \
            -o package/network/utils/fullconenat/src/Makefile

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure
        run: |
          cat >> .config << 'EOF'
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_glinet_gl-mt6000=y
          CONFIG_PACKAGE_kmod-nft-fullcone=y
          CONFIG_PACKAGE_kmod-sched=y
          CONFIG_PACKAGE_kmod-sched-cake=y
          CONFIG_PACKAGE_kmod-sched-core=y
          CONFIG_PACKAGE_kmod-sched-ctinfo=y
          CONFIG_PACKAGE_kmod-sched-connmark=y
          CONFIG_PACKAGE_kmod-sched-flower=y
          CONFIG_PACKAGE_kmod-sched-bpf=y
          CONFIG_PACKAGE_kmod-sched-red=y
          CONFIG_PACKAGE_kmod-sched-prio=y
          CONFIG_PACKAGE_kmod-ifb=y
          CONFIG_PACKAGE_kmod-veth=y
          CONFIG_PACKAGE_kmod-netem=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-app-sqm=y
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-app-statistics=y
          CONFIG_PACKAGE_luci-app-nlbwmon=y
          CONFIG_PACKAGE_sqm-scripts=y
          CONFIG_PACKAGE_miniupnpd-nftables=y
          CONFIG_PACKAGE_firewall4=y
          CONFIG_PACKAGE_nftables=y
          CONFIG_PACKAGE_tc-full=y
          CONFIG_PACKAGE_ip-full=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_wget-ssl=y
          CONFIG_PACKAGE_tcpdump=y
          CONFIG_PACKAGE_iperf3=y
          CONFIG_PACKAGE_ethtool-full=y
          CONFIG_PACKAGE_irqbalance=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_jq=y
          CONFIG_PACKAGE_coreutils-sleep=y
          CONFIG_ALL_KMODS=y
          CONFIG_ALL_NONSHARED=y
          EOF
          make defconfig

      - name: Download sources
        run: make download -j$(nproc)

      - name: Build firmware
        run: make -j$(nproc) IGNORE_ERRORS=m || make -j1 V=s IGNORE_ERRORS=m

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-pesa-gl-mt6000-fullcone
          path: |
            bin/targets/mediatek/filogic/openwrt-mediatek-filogic-glinet_gl-mt6000-squashfs-sysupgrade.bin
            bin/targets/mediatek/filogic/openwrt-mediatek-filogic-glinet_gl-mt6000-squashfs-factory.bin
          if-no-files-found: warn

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
